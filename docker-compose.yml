version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: jukebox-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jukebox
      POSTGRES_PASSWORD: jukebox_password
      POSTGRES_DB: jukebox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jukebox"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jukebox-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jukebox-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://jukebox:jukebox_password@postgres:5432/jukebox
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-this-in-production
      PORT: 3000
      NODE_ENV: production
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jukebox-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: jukebox-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jukebox-network

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  jukebox-network:
    driver: bridge
